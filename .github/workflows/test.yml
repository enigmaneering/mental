name: Mental Library Tests

on:
  workflow_dispatch:

jobs:
  test:
    name: Test Mental Library
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            display_name: macOS ARM64 (Metal)
            macos_arch: arm64
            runner_platform: darwin-arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            display_name: macOS x86_64 (Metal)
            macos_arch: x86_64
            runner_platform: darwin-arm64
          # Linux
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
            display_name: Linux x86_64 (Vulkan)
            use_xvfb: true
            runner_platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            display_name: Linux ARM64 (Vulkan)
            use_xvfb: true
            runner_platform: linux-arm64
          # Windows
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            display_name: Windows x86_64 (D3D12)
            runner_platform: windows-amd64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            display_name: Windows ARM64 (D3D12)
            runner_platform: windows-amd64
    runs-on: ${{ matrix.runner }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libx11-dev \
          libvulkan-dev \
          vulkan-tools \
          mesa-vulkan-drivers \
          xvfb \
          ocl-icd-opencl-dev \
          opencl-headers

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        # Dependencies already present on macOS runners
        echo "macOS dependencies ready"

    - name: Setup MinGW (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          make
          unzip
          mingw-w64-x86_64-opencl-headers
          mingw-w64-x86_64-opencl-icd

    - name: Download shader toolchain dependencies (Unix)
      if: runner.os != 'Windows'
      run: |
        # Get latest release from redistributables (with authentication to avoid rate limiting)
        VERSION=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/enigmaneering/redistributables/releases/latest | grep '"tag_name":' | head -1 | cut -d'"' -f4)

        if [ -z "$VERSION" ]; then
          echo "ERROR: Failed to determine latest redistributables version"
          echo "Attempting to fetch release info for debugging..."
          curl -v -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/enigmaneering/redistributables/releases/latest
          exit 1
        fi

        echo "Downloading shader toolchain $VERSION for ${{ matrix.platform }}"

        mkdir -p external/glslang external/spirv-cross external/dxc/bin external/naga/bin

        # Download and extract glslang
        if curl -L -f -o glslang.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/glslang-${{ matrix.platform }}.tar.gz"; then
          echo "Downloaded glslang.tar.gz"
          tar -xzf glslang.tar.gz
          cp -r glslang-${{ matrix.platform }}/* external/glslang/
        elif curl -L -f -o glslang.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/glslang-${{ matrix.platform }}.zip"; then
          echo "Downloaded glslang.zip"
          unzip -q glslang.zip
          cp -r glslang-${{ matrix.platform }}/* external/glslang/
        else
          echo "ERROR: Failed to download glslang for ${{ matrix.platform }}"
          exit 1
        fi

        # Download and extract SPIRV-Cross
        if curl -L -f -o spirv-cross.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/spirv-cross-${{ matrix.platform }}.tar.gz"; then
          echo "Downloaded spirv-cross.tar.gz"
          tar -xzf spirv-cross.tar.gz
          cp -r spirv-cross-${{ matrix.platform }}/* external/spirv-cross/
        elif curl -L -f -o spirv-cross.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/spirv-cross-${{ matrix.platform }}.zip"; then
          echo "Downloaded spirv-cross.zip"
          unzip -q spirv-cross.zip
          cp -r spirv-cross-${{ matrix.platform }}/* external/spirv-cross/
        else
          echo "ERROR: Failed to download spirv-cross for ${{ matrix.platform }}"
          exit 1
        fi

        # Download and extract DXC (use runner_platform for executable)
        RUNNER_PLATFORM="${{ matrix.runner_platform || matrix.platform }}"
        if curl -L -f -o dxc.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/dxc-$RUNNER_PLATFORM.tar.gz"; then
          echo "Downloaded dxc.tar.gz"
          tar -xzf dxc.tar.gz
          # Copy entire dxc directory structure (bin/, lib/, etc.)
          cp -r dxc-$RUNNER_PLATFORM/* external/dxc/ 2>/dev/null || true
        elif curl -L -f -o dxc.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/dxc-$RUNNER_PLATFORM.zip"; then
          echo "Downloaded dxc.zip"
          unzip -q dxc.zip
          # Copy entire dxc directory structure (bin/, lib/, etc.)
          cp -r dxc-$RUNNER_PLATFORM/* external/dxc/ 2>/dev/null || true
        else
          echo "WARNING: Failed to download dxc for $RUNNER_PLATFORM (optional)"
        fi

        # Download and extract Naga (use runner_platform for executable)
        curl -L -o naga.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/naga-$RUNNER_PLATFORM.tar.gz" 2>/dev/null || \
        curl -L -o naga.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/naga-$RUNNER_PLATFORM.zip" 2>/dev/null || true

        if [ -f naga.tar.gz ]; then
          tar -xzf naga.tar.gz
          cp -r naga-$RUNNER_PLATFORM/bin/* external/naga/bin/ 2>/dev/null || cp -r naga-$RUNNER_PLATFORM/* external/naga/bin/ 2>/dev/null || true
        elif [ -f naga.zip ]; then
          unzip -q naga.zip
          cp -r naga-$RUNNER_PLATFORM/bin/* external/naga/bin/ 2>/dev/null || cp -r naga-$RUNNER_PLATFORM/* external/naga/bin/ 2>/dev/null || true
        fi

        # Make binaries executable and remove macOS quarantine
        chmod +x external/dxc/bin/* 2>/dev/null || true
        chmod +x external/naga/bin/* 2>/dev/null || true
        if [ "$(uname)" = "Darwin" ]; then
          xattr -d com.apple.quarantine external/dxc/bin/* 2>/dev/null || true
          xattr -d com.apple.quarantine external/dxc/lib/* 2>/dev/null || true
          xattr -d com.apple.quarantine external/naga/bin/* 2>/dev/null || true
        fi

        echo "Dependencies downloaded and extracted"
        ls -la external/

    - name: Download shader toolchain dependencies (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        # Get latest release from redistributables (with authentication to avoid rate limiting)
        VERSION=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/enigmaneering/redistributables/releases/latest | grep '"tag_name":' | head -1 | cut -d'"' -f4)

        if [ -z "$VERSION" ]; then
          echo "ERROR: Failed to determine latest redistributables version"
          echo "Attempting to fetch release info for debugging..."
          curl -v -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/enigmaneering/redistributables/releases/latest
          exit 1
        fi

        echo "Downloading shader toolchain $VERSION for ${{ matrix.platform }}"

        mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin

        # Download and extract glslang
        if curl -L -f -o glslang.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/glslang-${{ matrix.platform }}.tar.gz"; then
          echo "Downloaded glslang.tar.gz"
          tar -xzf glslang.tar.gz
          cp -r glslang-${{ matrix.platform }}/* external/glslang/
        else
          echo "ERROR: Failed to download glslang for ${{ matrix.platform }}"
          exit 1
        fi

        # Download and extract SPIRV-Cross
        if curl -L -f -o spirv-cross.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/spirv-cross-${{ matrix.platform }}.tar.gz"; then
          echo "Downloaded spirv-cross.tar.gz"
          tar -xzf spirv-cross.tar.gz
          cp -r spirv-cross-${{ matrix.platform }}/* external/spirv-cross/
        else
          echo "ERROR: Failed to download spirv-cross for ${{ matrix.platform }}"
          exit 1
        fi

        # Download and extract DXC (use runner_platform for executable)
        RUNNER_PLATFORM="${{ matrix.runner_platform }}"
        if [ -z "$RUNNER_PLATFORM" ]; then
          RUNNER_PLATFORM="${{ matrix.platform }}"
        fi

        if curl -L -f -o dxc.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/dxc-$RUNNER_PLATFORM.zip"; then
          echo "Downloaded dxc.zip"
          unzip -q dxc.zip
          echo "DXC archive contents:"
          ls -la dxc-$RUNNER_PLATFORM/
          cp -r dxc-$RUNNER_PLATFORM/* external/dxc/
          echo "DXC extracted to external/dxc/:"
          ls -la external/dxc/
          if [ -d "external/dxc/bin" ]; then
            echo "DXC bin directory contents:"
            ls -la external/dxc/bin/
          fi
        else
          echo "ERROR: Failed to download dxc for $RUNNER_PLATFORM - DXC is required for shader compilation tests"
          exit 1
        fi

        # Download and extract Naga (optional, use runner_platform for executable)
        if curl -L -f -o naga.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/naga-$RUNNER_PLATFORM.tar.gz"; then
          echo "Downloaded naga.tar.gz"
          tar -xzf naga.tar.gz
          if [ -d "naga-$RUNNER_PLATFORM/bin" ]; then
            cp -r naga-$RUNNER_PLATFORM/bin/* external/naga/bin/
          else
            cp -r naga-$RUNNER_PLATFORM/* external/naga/bin/
          fi
        else
          echo "WARNING: Failed to download naga for $RUNNER_PLATFORM (optional)"
        fi

        echo "Dependencies downloaded and extracted"
        ls -la external/

    - name: Build (Unix)
      if: runner.os != 'Windows'
      run: |
        rm -rf build
        mkdir build
        cd build
        if [ -n "${{ matrix.macos_arch }}" ]; then
          cmake -DCMAKE_OSX_ARCHITECTURES=${{ matrix.macos_arch }} ..
        else
          cmake ..
        fi
        make -j4

    - name: Build (Windows with MinGW)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. -G "MSYS Makefiles"
        make -j4

    - name: Run tests (Linux with Xvfb)
      if: matrix.use_xvfb
      uses: GabrielBB/xvfb-action@v1
      with:
        run: |
          cd build
          ctest --output-on-failure

    - name: Run tests (macOS)
      if: ${{ !matrix.use_xvfb && runner.os != 'Windows' }}
      run: |
        cd build
        ctest --output-on-failure

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        cd build
        ctest --output-on-failure

    - name: Test Summary
      if: always()
      shell: bash
      run: |
        cd build
        echo "=== Test Results for ${{ matrix.display_name }} ==="
        cat Testing/Temporary/LastTest.log || true

  summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [test]
    if: always()

    steps:
    - name: Report Status
      run: |
        echo "🧪 Mental Library Test Results"
        echo "=============================="
        echo ""
        echo "Test status: ${{ needs.test.result }}"

        if [[ "${{ needs.test.result }}" == "success" ]]; then
          echo "✅ All platform tests passed!"
        else
          echo "❌ Some tests failed"
          exit 1
        fi
