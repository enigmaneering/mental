name: Mental Library Tests

on:
  workflow_dispatch:

jobs:
  test:
    name: Test Mental Library
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            display_name: macOS ARM64 (Metal)
          - os: macos-latest
            runner: macos-14
            platform: darwin-amd64
            display_name: macOS x86_64 (Metal)
          # Linux
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
            display_name: Linux x86_64 (Vulkan)
            use_xvfb: true
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            display_name: Linux ARM64 (Vulkan)
            use_xvfb: true
          # Windows
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            display_name: Windows x86_64 (D3D12)
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            display_name: Windows ARM64 (D3D12)
    runs-on: ${{ matrix.runner }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libx11-dev \
          libvulkan-dev \
          vulkan-tools \
          mesa-vulkan-drivers \
          xvfb

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        # Dependencies already present on macOS runners
        echo "macOS dependencies ready"

    - name: Download shader toolchain dependencies
      run: |
        # Get latest release from redistributables
        LATEST_RELEASE=$(curl -s https://api.github.com/repos/enigmaneering/redistributables/releases/latest)
        VERSION=$(echo "$LATEST_RELEASE" | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')

        echo "Downloading shader toolchain $VERSION for ${{ matrix.platform }}"

        mkdir -p external/glslang external/spirv-cross external/dxc/bin external/naga/bin

        # Download and extract glslang
        curl -L -o glslang.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/glslang-${{ matrix.platform }}.tar.gz" 2>/dev/null || \
        curl -L -o glslang.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/glslang-${{ matrix.platform }}.zip" 2>/dev/null || true

        if [ -f glslang.tar.gz ]; then
          tar -xzf glslang.tar.gz
          cp -r glslang-${{ matrix.platform }}/* external/glslang/
        elif [ -f glslang.zip ]; then
          unzip -q glslang.zip
          cp -r glslang-${{ matrix.platform }}/* external/glslang/
        fi

        # Download and extract SPIRV-Cross
        curl -L -o spirv-cross.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/spirv-cross-${{ matrix.platform }}.tar.gz" 2>/dev/null || \
        curl -L -o spirv-cross.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/spirv-cross-${{ matrix.platform }}.zip" 2>/dev/null || true

        if [ -f spirv-cross.tar.gz ]; then
          tar -xzf spirv-cross.tar.gz
          cp -r spirv-cross-${{ matrix.platform }}/* external/spirv-cross/
        elif [ -f spirv-cross.zip ]; then
          unzip -q spirv-cross.zip
          cp -r spirv-cross-${{ matrix.platform }}/* external/spirv-cross/
        fi

        # Download and extract DXC
        curl -L -o dxc.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/dxc-${{ matrix.platform }}.tar.gz" 2>/dev/null || \
        curl -L -o dxc.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/dxc-${{ matrix.platform }}.zip" 2>/dev/null || true

        if [ -f dxc.tar.gz ]; then
          tar -xzf dxc.tar.gz
          cp -r dxc-${{ matrix.platform }}/bin/* external/dxc/bin/ 2>/dev/null || cp -r dxc-${{ matrix.platform }}/* external/dxc/bin/ 2>/dev/null || true
        elif [ -f dxc.zip ]; then
          unzip -q dxc.zip
          cp -r dxc-${{ matrix.platform }}/bin/* external/dxc/bin/ 2>/dev/null || cp -r dxc-${{ matrix.platform }}/* external/dxc/bin/ 2>/dev/null || true
        fi

        # Download and extract Naga
        curl -L -o naga.tar.gz "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/naga-${{ matrix.platform }}.tar.gz" 2>/dev/null || \
        curl -L -o naga.zip "https://github.com/enigmaneering/redistributables/releases/download/$VERSION/naga-${{ matrix.platform }}.zip" 2>/dev/null || true

        if [ -f naga.tar.gz ]; then
          tar -xzf naga.tar.gz
          cp -r naga-${{ matrix.platform }}/bin/* external/naga/bin/ 2>/dev/null || cp -r naga-${{ matrix.platform }}/* external/naga/bin/ 2>/dev/null || true
        elif [ -f naga.zip ]; then
          unzip -q naga.zip
          cp -r naga-${{ matrix.platform }}/bin/* external/naga/bin/ 2>/dev/null || cp -r naga-${{ matrix.platform }}/* external/naga/bin/ 2>/dev/null || true
        fi

        echo "Dependencies downloaded and extracted"
        ls -la external/

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v2

    - name: Build (Unix)
      if: runner.os != 'Windows'
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake ..
        make -j4

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022"
        cmake --build . --config Release

    - name: Run tests (Linux with Xvfb)
      if: matrix.use_xvfb
      uses: GabrielBB/xvfb-action@v1
      with:
        run: |
          cd build
          ctest --output-on-failure

    - name: Run tests (macOS/Windows)
      if: ${{ !matrix.use_xvfb }}
      run: |
        cd build
        ctest --output-on-failure

    - name: Run tests (Windows Release config)
      if: runner.os == 'Windows'
      run: |
        cd build
        ctest --output-on-failure -C Release

    - name: Test Summary
      if: always()
      run: |
        cd build
        echo "=== Test Results for ${{ matrix.display_name }} ==="
        cat Testing/Temporary/LastTest.log || true

  summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [test]
    if: always()

    steps:
    - name: Report Status
      run: |
        echo "🧪 Mental Library Test Results"
        echo "=============================="
        echo ""
        echo "Test status: ${{ needs.test.result }}"

        if [[ "${{ needs.test.result }}" == "success" ]]; then
          echo "✅ All platform tests passed!"
        else
          echo "❌ Some tests failed"
          exit 1
        fi
