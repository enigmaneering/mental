name: Build Mental Libraries

on:
  workflow_dispatch:

jobs:
  determine-version:
    name: Determine Next Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release and increment
        id: get-version
        run: |
          LATEST_TAG=$(git tag -l 'v*.*.*' | sort -V | tail -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v0.0.42"
          else
            VERSION_WITHOUT_V="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_WITHOUT_V"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-libraries:
    name: Build Mental Library
    needs: [determine-version]
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14
            platform: darwin-arm64
            goos: darwin
            goarch: arm64
            lib_name: libmental-darwin-arm64.dylib
            external_platform: darwin-arm64
          - os: macos-latest
            runner: macos-14
            platform: darwin-amd64
            goos: darwin
            goarch: amd64
            lib_name: libmental-darwin-amd64.dylib
            external_platform: darwin-amd64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
            goos: linux
            goarch: amd64
            lib_name: libmental-linux-amd64.so
            external_platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            goos: linux
            goarch: arm64
            lib_name: libmental-linux-arm64.so
            external_platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            goos: windows
            goarch: amd64
            lib_name: mental-windows-amd64.dll
            external_platform: windows-amd64
          - os: windows-latest
            runner: windows-11-arm
            platform: windows-arm64
            goos: windows
            goarch: arm64
            lib_name: mental-windows-arm64.dll
            external_platform: windows-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y opencl-headers ocl-icd-opencl-dev libvulkan-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download OpenCL headers
          New-Item -ItemType Directory -Force -Path "C:\opencl\include\CL"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/KhronosGroup/OpenCL-Headers/main/CL/cl.h" -OutFile "C:\opencl\include\CL\cl.h"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/KhronosGroup/OpenCL-Headers/main/CL/cl_platform.h" -OutFile "C:\opencl\include\CL\cl_platform.h"
          echo "C:\opencl\include" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch external libraries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PLATFORM: ${{ matrix.external_platform }}
        run: |
          go run fetch_external.go

      - name: Build library (Unix)
        if: runner.os != 'Windows'
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -buildmode=c-shared -o ${{ matrix.lib_name }} ./capi

      - name: Build library (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:CGO_ENABLED="1"
          $env:CGO_CFLAGS="-IC:\opencl\include"
          $env:GOOS="${{ matrix.goos }}"
          $env:GOARCH="${{ matrix.goarch }}"
          go build -buildmode=c-shared -o ${{ matrix.lib_name }} ./capi

      - name: Copy header
        run: |
          cp capi/enigmatic.h mental.h

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.platform }}
          path: |
            ${{ matrix.lib_name }}
            mental.h

  create-release:
    name: Create Mental Release
    needs: [determine-version, build-libraries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ needs.determine-version.outputs.version }}"
          git tag $TAG
          git push origin $TAG

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'lib-*'

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.determine-version.outputs.version }}
          name: Mental ${{ needs.determine-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/libmental-*
            artifacts/**/mental-*
            artifacts/**/mental.h
          body: |
            # Mental - Unified GPU Compute Library

            Cross-platform GPU compute library with automatic shader transpilation.

            ## 📦 Downloads

            This release includes pre-built libraries for:

            ### macOS
            - `libmental-darwin-arm64.dylib` - Apple Silicon (M1/M2/M3/M4)
            - `libmental-darwin-amd64.dylib` - Intel x86_64

            ### Linux
            - `libmental-linux-amd64.so` - x86_64
            - `libmental-linux-arm64.so` - ARM64

            ### Windows
            - `mental-windows-amd64.dll` - x86_64
            - `mental-windows-arm64.dll` - ARM64

            ## 📄 Header File

            - `mental.h` - C API header (same for all platforms)

            ## 🚀 Quick Start (C)

            ```c
            #include "mental.h"
            #include <stdio.h>

            int main() {
                mental_init();

                // Enumerate GPUs
                int count = mental_get_device_count();
                printf("Found %d GPU(s)\n", count);

                // Create GPU memory
                MentalReference ref = mental_create_reference(1024, 0);

                // Compile shader (auto-detects GLSL/HLSL/MSL/WGSL)
                const char* shader = "/* your shader code */";
                MentalKernel kernel = mental_compile_kernel(shader, 0);

                // Execute
                mental_kernel_dispatch(kernel, NULL, 0, ref, 1024);

                // Cleanup
                mental_release_kernel(kernel);
                mental_release_reference(ref);

                return 0;
            }
            ```

            ## 🔗 Linking

            ### macOS
            ```bash
            clang myapp.c -o myapp -L. -lmental-darwin-arm64
            # or
            clang myapp.c -o myapp -L. -lmental-darwin-amd64
            ```

            ### Linux
            ```bash
            gcc myapp.c -o myapp -L. -lmental-linux-amd64
            # or
            gcc myapp.c -o myapp -L. -lmental-linux-arm64
            ```

            ### Windows
            ```cmd
            cl myapp.c mental-windows-amd64.lib
            ```

            ## ✨ Features

            - **Unified API**: Single API across Metal, Vulkan, D3D12, OpenCL
            - **Auto-transpilation**: Write GLSL, runs on any GPU
            - **Thread-safe**: Call from any thread
            - **Manual memory**: C API requires explicit cleanup

            ## 📚 Documentation

            See the header file `mental.h` for complete API documentation.

            ---

            🤖 Built with GitHub Actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
