name: Test Matrix

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================================================
  #  Hosted runners — GitHub-provided, no real GPU
  # ================================================================
  hosted:
    name: "${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Metal + OpenCL via Xcode
          - name: "macOS arm64"
            runner: macos-14
            platform: darwin-arm64
            packages: ""
            install_vulkan: false
            needs_xvfb: false

          - name: "macOS amd64"
            runner: macos-14
            platform: darwin-amd64
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            packages: ""
            install_vulkan: false
            needs_xvfb: false

          # Windows — D3D12 via Windows SDK
          - name: "Windows amd64"
            runner: windows-latest
            platform: windows-amd64
            packages: ""
            install_vulkan: false
            needs_xvfb: false

          - name: "Windows arm64"
            runner: windows-11-arm
            platform: windows-arm64
            packages: ""
            install_vulkan: false
            needs_xvfb: false

          - name: "Windows amd64 + Vulkan"
            runner: windows-latest
            platform: windows-amd64
            packages: ""
            install_vulkan: true
            needs_xvfb: false

          # Linux amd64 — Vulkan via lavapipe
          - name: "Linux amd64 (Vulkan)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: >-
              libvulkan-dev mesa-vulkan-drivers
              libopengl-dev libglx-dev libx11-dev
              xvfb
            install_vulkan: false
            needs_xvfb: true

          # WebAssembly — build-only verification
          - name: "WASM"
            runner: ubuntu-latest
            platform: wasm
            packages: ""
            install_vulkan: false
            needs_xvfb: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Emscripten (WASM only) ----
      - name: Install Emscripten
        if: matrix.platform == 'wasm'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.61"

      # ---- Fetch external dependencies ----
      - name: Fetch external dependencies (WASM)
        if: matrix.platform == 'wasm'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          mkdir -p external/glslang external/spirv-cross external/wgpu/include
          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "glslang-linux-amd64.tar.gz" --dir .
          tar -xzf "glslang-linux-amd64.tar.gz"
          cp -r glslang-linux-amd64/* external/glslang/
          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "spirv-cross-linux-amd64.tar.gz" --dir .
          tar -xzf "spirv-cross-linux-amd64.tar.gz"
          cp -r spirv-cross-linux-amd64/* external/spirv-cross/

      - name: Fetch external dependencies (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          echo "Downloading external deps $VERSION for ${{ matrix.platform }}"
          mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "glslang-${{ matrix.platform }}.tar.gz" --dir .
          tar -xzf "glslang-${{ matrix.platform }}.tar.gz"
          cp -r "glslang-${{ matrix.platform }}"/* external/glslang/

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "spirv-cross-${{ matrix.platform }}.tar.gz" --dir .
          tar -xzf "spirv-cross-${{ matrix.platform }}.tar.gz"
          cp -r "spirv-cross-${{ matrix.platform }}"/* external/spirv-cross/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "dxc-${{ matrix.platform }}.tar.gz"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "naga-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "naga-${{ matrix.platform }}.tar.gz"
            if [ -d "naga-${{ matrix.platform }}/bin" ]; then
              cp -r "naga-${{ matrix.platform }}/bin"/* external/naga/bin/
            else
              cp -r "naga-${{ matrix.platform }}"/* external/naga/bin/
            fi
          fi

          chmod +x external/dxc/bin/* external/naga/bin/* 2>/dev/null || true
          if [ "$(uname)" = "Darwin" ]; then
            xattr -d com.apple.quarantine external/dxc/bin/* external/dxc/lib/* external/naga/bin/* 2>/dev/null || true
          fi

      - name: Fetch external dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          echo "Downloading external deps $VERSION for ${{ matrix.platform }}"
          mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "glslang-${{ matrix.platform }}.tar.gz"
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-${{ matrix.platform }}.zip" --dir .
            unzip -q "glslang-${{ matrix.platform }}.zip"
          fi
          cp -r "glslang-${{ matrix.platform }}"/* external/glslang/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "spirv-cross-${{ matrix.platform }}.tar.gz"
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-${{ matrix.platform }}.zip" --dir .
            unzip -q "spirv-cross-${{ matrix.platform }}.zip"
          fi
          cp -r "spirv-cross-${{ matrix.platform }}"/* external/spirv-cross/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.zip" --dir . 2>/dev/null; then
            unzip -q "dxc-${{ matrix.platform }}.zip"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          elif gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "dxc-${{ matrix.platform }}.tar.gz"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "naga-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "naga-${{ matrix.platform }}.tar.gz"
            if [ -d "naga-${{ matrix.platform }}/bin" ]; then
              cp -r "naga-${{ matrix.platform }}/bin"/* external/naga/bin/
            else
              cp -r "naga-${{ matrix.platform }}"/* external/naga/bin/
            fi
          fi

      # ---- Platform setup ----
      - name: Install packages (Linux)
        if: runner.os == 'Linux' && matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Vulkan SDK (Windows)
        if: matrix.install_vulkan
        shell: pwsh
        run: |
          $json = (Invoke-WebRequest -Uri 'https://vulkan.lunarg.com/sdk/latest/windows.json').Content | ConvertFrom-Json
          $ver = $json.windows
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          .\VulkanSDK.exe --accept-licenses --default-answer --confirm-command install copy_only=1
          $sdk = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH
          Remove-Item VulkanSDK.exe

      - name: Set up MinGW (Windows amd64)
        if: runner.os == 'Windows' && matrix.platform == 'windows-amd64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make

      - name: Set up MinGW (Windows arm64)
        if: runner.os == 'Windows' && matrix.platform == 'windows-arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: false
          install: >-
            mingw-w64-clang-aarch64-cc
            mingw-w64-clang-aarch64-cmake
            make

      # ---- Configure ----
      - name: Configure (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        run: cmake -B build -DBUILD_TESTING=ON ${{ matrix.cmake_extra }}

      - name: Configure (WASM)
        if: matrix.platform == 'wasm'
        run: |
          emcmake cmake -B build \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DMENTAL_DISABLE_METAL=ON \
            -DMENTAL_DISABLE_D3D12=ON \
            -DMENTAL_DISABLE_VULKAN=ON \
            -DMENTAL_DISABLE_OPENCL=ON \
            -DMENTAL_DISABLE_OPENGL=ON \
            -DMENTAL_DISABLE_POCL=ON \
            -DMENTAL_DISABLE_WEBGPU=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -B build -G "MSYS Makefiles" -DBUILD_TESTING=ON

      # ---- Build ----
      - name: Build (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        run: cmake --build build --parallel

      - name: Build (WASM)
        if: matrix.platform == 'wasm'
        run: emmake cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      # ---- Test ----
      - name: Verify WASM build
        if: matrix.platform == 'wasm'
        run: |
          echo "WASM build compiled successfully (no runtime tests — no browser in CI)"
          ls -la build/libmental-static.a build/libmental.a 2>/dev/null || ls -la build/*.a 2>/dev/null || true

      - name: Test
        if: ${{ !matrix.needs_xvfb && runner.os != 'Windows' && matrix.platform != 'wasm' }}
        working-directory: build
        run: ctest --output-on-failure --timeout 120

      - name: Test (with Xvfb)
        if: ${{ matrix.needs_xvfb }}
        working-directory: build
        run: xvfb-run --auto-servernum ctest --output-on-failure --timeout 120

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          ctest --output-on-failure --timeout 120

      # ---- Report ----
      - name: Report discovered backends
        if: always()
        shell: bash
        run: |
          echo "### Backend Discovery" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "MENTAL_HAS_" build/CMakeCache.txt >> $GITHUB_STEP_SUMMARY || echo "No backends discovered" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ================================================================
  #  Galadriel — self-hosted ARM64 (M4 MacBook)
  #  Tests each Linux backend tier in dedicated Parallels VMs.
  #  VMs have deps pre-installed at /opt/mental-external.
  #  Runs sequentially (one GPU, one VM at a time).
  # ================================================================
  galadriel:
    name: "galadriel: ${{ matrix.name }}"
    runs-on: [self-hosted, galadriel]
    timeout-minutes: 30
    concurrency: galadriel-vm

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: "macOS arm64 (native)"
            vm: ""
            test_native: true

          - name: "Linux ARM64 (full)"
            vm: ci-linux-arm64-full

          - name: "Linux ARM64 (Vulkan)"
            vm: ci-linux-arm64-vulkan

          - name: "Linux ARM64 (WebGPU)"
            vm: ci-linux-arm64-webgpu

          - name: "Linux ARM64 (OpenCL)"
            vm: ci-linux-arm64-opencl

          - name: "Linux ARM64 (OpenGL)"
            vm: ci-linux-arm64-opengl

          - name: "Linux ARM64 (PoCL)"
            vm: ci-linux-arm64-pocl

          - name: "Linux ARM64 (bare)"
            vm: ci-linux-arm64-bare

          - name: "Windows ARM64"
            vm: "Windows 11"
            windows: true

    steps:
      # ---- Native macOS test (no VM) ----
      - name: Checkout
        if: matrix.test_native
        uses: actions/checkout@v4

      - name: Fetch deps (macOS native)
        if: matrix.test_native
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin
          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "glslang-darwin-arm64.tar.gz" --dir .
          tar -xzf "glslang-darwin-arm64.tar.gz"
          cp -r glslang-darwin-arm64/* external/glslang/
          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "spirv-cross-darwin-arm64.tar.gz" --dir .
          tar -xzf "spirv-cross-darwin-arm64.tar.gz"
          cp -r spirv-cross-darwin-arm64/* external/spirv-cross/
          for dep in dxc naga; do
            if gh release download "$VERSION" --repo enigmaneering/redistributables \
                --pattern "${dep}-darwin-arm64.tar.gz" --dir . 2>/dev/null; then
              tar -xzf "${dep}-darwin-arm64.tar.gz"
              cp -r "${dep}-darwin-arm64"/* external/${dep}/ 2>/dev/null || \
              cp -r "${dep}-darwin-arm64"/* external/${dep}/bin/ 2>/dev/null || true
            fi
          done
          chmod +x external/dxc/bin/* external/naga/bin/* 2>/dev/null || true
          xattr -d com.apple.quarantine external/dxc/bin/* external/dxc/lib/* external/naga/bin/* 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build & Test (macOS native)
        if: matrix.test_native
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          cmake -B build -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF
          cmake --build build --parallel
          cd build && ctest --output-on-failure --timeout 120

      # ---- VM-based tests (Linux + Windows) ----
      - name: Checkout (for VM tests)
        if: ${{ !matrix.test_native }}
        uses: actions/checkout@v4

      - name: Start VM
        if: ${{ !matrix.test_native }}
        run: |
          /usr/local/bin/prlctl start "${{ matrix.vm }}" 2>&1 || true
          echo "Waiting for VM to boot..."
          for i in $(seq 1 30); do
            if [ "${{ matrix.windows }}" = "true" ]; then
              IP=$(/usr/local/bin/prlctl exec "${{ matrix.vm }}" ipconfig 2>/dev/null | grep "IPv4 Address" | head -1 | sed 's/.*: //')
            else
              IP=$(/usr/local/bin/prlctl exec "${{ matrix.vm }}" hostname -I 2>/dev/null | awk '{print $1}')
            fi
            # Trim whitespace
            IP=$(echo "$IP" | tr -d '[:space:]')
            if [ -n "$IP" ]; then
              echo "VM IP: $IP"
              echo "VM_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 3
          done
          if [ -z "$IP" ]; then
            echo "::error::VM did not get an IP within 90s"
            exit 1
          fi

      - name: Copy source to VM (Linux)
        if: ${{ !matrix.test_native && !matrix.windows }}
        run: |
          ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no parallels@$VM_IP "rm -rf /tmp/mental && mkdir -p /tmp/mental"
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" . parallels@$VM_IP:/tmp/mental/

      - name: Build & Test (Linux VM)
        if: ${{ !matrix.test_native && !matrix.windows }}
        run: |
          ssh parallels@$VM_IP bash << 'VMSCRIPT'
          set -e
          cd /tmp/mental
          ln -sf /opt/mental-external external
          cmake -B build -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF
          cmake --build build --parallel
          cd build
          if command -v xvfb-run >/dev/null 2>&1; then
            xvfb-run --auto-servernum ctest --output-on-failure --timeout 120
          else
            ctest --output-on-failure --timeout 120
          fi
          VMSCRIPT

      - name: Copy source to VM (Windows)
        if: ${{ matrix.windows }}
        run: |
          # Windows MSYS2 SSH shell — use prlctl exec to set up, then rsync source
          /usr/local/bin/prlctl exec "${{ matrix.vm }}" cmd /c "if exist C:\Temp\mental rmdir /s /q C:\Temp\mental"
          /usr/local/bin/prlctl exec "${{ matrix.vm }}" cmd /c "mkdir C:\Temp\mental"
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" . rpetz@$VM_IP:/tmp/mental/ 2>/dev/null || \
          /usr/local/bin/prlctl exec "${{ matrix.vm }}" bash -lc "rm -rf /tmp/mental && mkdir -p /tmp/mental"

      - name: Fetch deps & Build & Test (Windows VM)
        if: ${{ matrix.windows }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          # Download deps on the Mac and push via prlctl shared folder
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          TMPDIR=$(mktemp -d)
          PLATFORM="windows-arm64"
          mkdir -p $TMPDIR/external/glslang $TMPDIR/external/spirv-cross $TMPDIR/external/dxc $TMPDIR/external/naga/bin

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "glslang-${PLATFORM}.tar.gz" --dir $TMPDIR
          tar -xzf "$TMPDIR/glslang-${PLATFORM}.tar.gz" -C $TMPDIR
          cp -r "$TMPDIR/glslang-${PLATFORM}"/* $TMPDIR/external/glslang/

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "spirv-cross-${PLATFORM}.tar.gz" --dir $TMPDIR
          tar -xzf "$TMPDIR/spirv-cross-${PLATFORM}.tar.gz" -C $TMPDIR
          cp -r "$TMPDIR/spirv-cross-${PLATFORM}"/* $TMPDIR/external/spirv-cross/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${PLATFORM}.zip" --dir $TMPDIR 2>/dev/null; then
            cd $TMPDIR && unzip -qo "dxc-${PLATFORM}.zip" && cd -
            cp -r "$TMPDIR/dxc-${PLATFORM}"/* $TMPDIR/external/dxc/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "naga-${PLATFORM}.tar.gz" --dir $TMPDIR 2>/dev/null; then
            tar -xzf "$TMPDIR/naga-${PLATFORM}.tar.gz" -C $TMPDIR
            if [ -d "$TMPDIR/naga-${PLATFORM}/bin" ]; then
              cp -r "$TMPDIR/naga-${PLATFORM}/bin"/* $TMPDIR/external/naga/bin/
            else
              cp -r "$TMPDIR/naga-${PLATFORM}"/* $TMPDIR/external/naga/bin/
            fi
          fi

          # rsync source + external to the VM's workspace
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            $GITHUB_WORKSPACE/ rpetz@$VM_IP:/tmp/mental/ 2>/dev/null || true
          rsync -az -e "ssh -o StrictHostKeyChecking=no" \
            $TMPDIR/external/ rpetz@$VM_IP:/tmp/mental/external/ 2>/dev/null || true
          rm -rf $TMPDIR

          # Build and test inside the VM
          ssh rpetz@$VM_IP bash << 'VMSCRIPT'
          set -e
          cd /tmp/mental
          cmake -B build -G "MSYS Makefiles" -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF
          cmake --build build --parallel
          cd build
          ctest --output-on-failure --timeout 120
          VMSCRIPT

      - name: Stop VM
        if: ${{ always() && !matrix.test_native }}
        run: |
          /usr/local/bin/prlctl stop "${{ matrix.vm }}" --kill 2>&1 || true

      # ---- Report ----
      - name: Report discovered backends
        if: always()
        shell: bash
        run: |
          if [ -f build/CMakeCache.txt ]; then
            echo "### Backend Discovery (native)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "MENTAL_HAS_" build/CMakeCache.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### VM Test" >> $GITHUB_STEP_SUMMARY
            echo "Tested in VM: ${{ matrix.vm }}" >> $GITHUB_STEP_SUMMARY
          fi
