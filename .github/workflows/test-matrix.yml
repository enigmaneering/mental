name: Test Matrix

on:
  workflow_dispatch:
  workflow_call:

# Cancel in-flight runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ============================================================
          #  macOS — Metal + OpenCL (always present via frameworks)
          # ============================================================
          - name: "macOS arm64"
            runner: macos-14
            platform: darwin-arm64
            artifact: sanity-check-darwin-arm64

          - name: "macOS amd64"
            runner: macos-15-intel
            platform: darwin-amd64
            artifact: sanity-check-darwin-amd64

          # ============================================================
          #  Windows — D3D12 + D3D11 (always present via Windows SDK)
          # ============================================================
          - name: "Windows amd64"
            runner: windows-latest
            platform: windows-amd64
            artifact: sanity-check-windows-amd64

          - name: "Windows arm64"
            runner: windows-11-arm
            platform: windows-arm64
            artifact: sanity-check-windows-arm64

          # ============================================================
          #  Linux — full stack (Vulkan + OpenCL + PoCL + X11)
          # ============================================================
          - name: "Linux amd64 (full)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: >-
              xvfb opencl-headers
              libvulkan1 libvulkan-dev mesa-vulkan-drivers
              ocl-icd-opencl-dev pocl-opencl-icd
              libx11-dev
            needs_xvfb: true
            artifact: sanity-check-linux-amd64

          - name: "Linux arm64 (full)"
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            packages: >-
              xvfb opencl-headers
              libvulkan1 libvulkan-dev mesa-vulkan-drivers
              ocl-icd-opencl-dev pocl-opencl-icd
              libx11-dev
            needs_xvfb: true
            artifact: sanity-check-linux-arm64

          # ============================================================
          #  Linux — fallback tiers (stress test the fallback chain)
          # ============================================================

          # Vulkan only — no OpenCL, no PoCL
          - name: "Linux amd64 (Vulkan only)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: >-
              xvfb
              libvulkan1 libvulkan-dev mesa-vulkan-drivers
              libx11-dev
            needs_xvfb: true

          - name: "Linux arm64 (Vulkan only)"
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            packages: >-
              xvfb
              libvulkan1 libvulkan-dev mesa-vulkan-drivers
              libx11-dev
            needs_xvfb: true

          # OpenCL only — no Vulkan
          - name: "Linux amd64 (OpenCL only)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: >-
              xvfb opencl-headers
              ocl-icd-opencl-dev pocl-opencl-icd

          - name: "Linux arm64 (OpenCL only)"
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            packages: >-
              xvfb opencl-headers
              ocl-icd-opencl-dev pocl-opencl-icd

          # PoCL only — CPU compute, last GPU-capable resort
          - name: "Linux amd64 (PoCL only)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: >-
              opencl-headers
              pocl-opencl-icd

          - name: "Linux arm64 (PoCL only)"
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            packages: >-
              opencl-headers
              pocl-opencl-icd

          # Bare — nothing installed, tests graceful "no devices" error
          - name: "Linux amd64 (bare)"
            runner: ubuntu-latest
            platform: linux-amd64
            packages: ""

          - name: "Linux arm64 (bare)"
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            packages: ""

          # ============================================================
          #  WebAssembly — build-only verification
          # ============================================================
          - name: "WASM"
            runner: ubuntu-latest
            platform: wasm
            packages: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Verify architecture matches expectations ----
      - name: Verify runner architecture
        shell: bash
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Runner: ${{ matrix.runner }}"
          echo "RUNNER_ARCH: $RUNNER_ARCH"
          echo "RUNNER_OS: $RUNNER_OS"
          echo "uname -m: $(uname -m 2>/dev/null || echo N/A)"

          if [[ "${{ matrix.platform }}" == "darwin-amd64" && "$RUNNER_ARCH" != "X64" ]]; then
            echo "::error::Expected amd64 (X64) runner but got $RUNNER_ARCH"
            exit 1
          fi
          if [[ "${{ matrix.platform }}" == "darwin-arm64" && "$RUNNER_ARCH" != "ARM64" ]]; then
            echo "::error::Expected arm64 runner but got $RUNNER_ARCH"
            exit 1
          fi

      # ---- Emscripten (WASM only) ----
      - name: Install Emscripten
        if: matrix.platform == 'wasm'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.61"

      # ---- Fetch external dependencies ----
      - name: Fetch external dependencies (WASM)
        if: matrix.platform == 'wasm'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          mkdir -p external/glslang external/spirv-cross

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-wasm.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "glslang-wasm.tar.gz"
            cp -r glslang-wasm/* external/glslang/
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-linux-amd64.tar.gz" --dir .
            tar -xzf "glslang-linux-amd64.tar.gz"
            cp -r glslang-linux-amd64/* external/glslang/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-wasm.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "spirv-cross-wasm.tar.gz"
            cp -r spirv-cross-wasm/* external/spirv-cross/
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-linux-amd64.tar.gz" --dir .
            tar -xzf "spirv-cross-linux-amd64.tar.gz"
            cp -r spirv-cross-linux-amd64/* external/spirv-cross/
          fi

      - name: Fetch external dependencies (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          echo "Downloading external deps $VERSION for ${{ matrix.platform }}"
          mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "glslang-${{ matrix.platform }}.tar.gz" --dir .
          tar -xzf "glslang-${{ matrix.platform }}.tar.gz"
          cp -r "glslang-${{ matrix.platform }}"/* external/glslang/

          gh release download "$VERSION" --repo enigmaneering/redistributables \
            --pattern "spirv-cross-${{ matrix.platform }}.tar.gz" --dir .
          tar -xzf "spirv-cross-${{ matrix.platform }}.tar.gz"
          cp -r "spirv-cross-${{ matrix.platform }}"/* external/spirv-cross/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "dxc-${{ matrix.platform }}.tar.gz"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "naga-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "naga-${{ matrix.platform }}.tar.gz"
            if [ -d "naga-${{ matrix.platform }}/bin" ]; then
              cp -r "naga-${{ matrix.platform }}/bin"/* external/naga/bin/
            else
              cp -r "naga-${{ matrix.platform }}"/* external/naga/bin/
            fi
          fi

          chmod +x external/dxc/bin/* external/naga/bin/* 2>/dev/null || true
          if [ "$(uname)" = "Darwin" ]; then
            xattr -d com.apple.quarantine external/dxc/bin/* external/dxc/lib/* external/naga/bin/* 2>/dev/null || true
          fi

      - name: Fetch external dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --repo enigmaneering/redistributables --json tagName -q .tagName)
          echo "Downloading external deps $VERSION for ${{ matrix.platform }}"
          mkdir -p external/glslang external/spirv-cross external/dxc external/naga/bin

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "glslang-${{ matrix.platform }}.tar.gz"
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "glslang-${{ matrix.platform }}.zip" --dir .
            unzip -q "glslang-${{ matrix.platform }}.zip"
          fi
          cp -r "glslang-${{ matrix.platform }}"/* external/glslang/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "spirv-cross-${{ matrix.platform }}.tar.gz"
          else
            gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "spirv-cross-${{ matrix.platform }}.zip" --dir .
            unzip -q "spirv-cross-${{ matrix.platform }}.zip"
          fi
          cp -r "spirv-cross-${{ matrix.platform }}"/* external/spirv-cross/

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.zip" --dir . 2>/dev/null; then
            unzip -q "dxc-${{ matrix.platform }}.zip"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          elif gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "dxc-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "dxc-${{ matrix.platform }}.tar.gz"
            cp -r "dxc-${{ matrix.platform }}"/* external/dxc/
          fi

          if gh release download "$VERSION" --repo enigmaneering/redistributables \
              --pattern "naga-${{ matrix.platform }}.tar.gz" --dir . 2>/dev/null; then
            tar -xzf "naga-${{ matrix.platform }}.tar.gz"
            if [ -d "naga-${{ matrix.platform }}/bin" ]; then
              cp -r "naga-${{ matrix.platform }}/bin"/* external/naga/bin/
            else
              cp -r "naga-${{ matrix.platform }}"/* external/naga/bin/
            fi
          fi

      # ---- Platform setup ----
      - name: Install packages (Linux)
        if: runner.os == 'Linux' && matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Set up MinGW (Windows amd64)
        if: runner.os == 'Windows' && matrix.platform == 'windows-amd64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-vulkan-loader

      - name: Set up MinGW (Windows arm64)
        if: runner.os == 'Windows' && matrix.platform == 'windows-arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: false
          install: >-
            mingw-w64-clang-aarch64-cc
            mingw-w64-clang-aarch64-cmake
            make
            mingw-w64-clang-aarch64-opencl-headers
            mingw-w64-clang-aarch64-opencl-icd
            mingw-w64-clang-aarch64-vulkan-headers
            mingw-w64-clang-aarch64-vulkan-loader

      # ---- Configure ----
      - name: Configure (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        run: cmake -B build -DBUILD_TESTING=ON ${{ matrix.cmake_extra }}

      - name: Configure (WASM)
        if: matrix.platform == 'wasm'
        run: |
          emcmake cmake -B build \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DMENTAL_DISABLE_METAL=ON \
            -DMENTAL_DISABLE_POCL=ON \
            -DMENTAL_DISABLE_WEBGPU=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -B build -G "MSYS Makefiles" -DBUILD_TESTING=ON

      # ---- Build ----
      - name: Build (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'wasm'
        run: cmake --build build --parallel

      - name: Build (WASM)
        if: matrix.platform == 'wasm'
        run: emmake cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      # ---- Test ----
      - name: Test (WASM via Node.js)
        if: matrix.platform == 'wasm'
        run: |
          echo "Running WASM sanity check via Node.js..."
          ls -la build/sanity-check.js build/sanity-check.wasm 2>/dev/null || ls -la build/sanity-check* 2>/dev/null
          node build/sanity-check.js

      - name: Test
        if: ${{ !matrix.needs_xvfb && runner.os != 'Windows' && matrix.platform != 'wasm' }}
        working-directory: build
        run: ctest --output-on-failure --timeout 30

      - name: Test (with Xvfb)
        if: ${{ matrix.needs_xvfb }}
        working-directory: build
        run: xvfb-run --auto-servernum ctest --output-on-failure --timeout 30

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          ctest --output-on-failure --timeout 30

      # ---- Run sanity check to verify fallback behavior ----
      - name: Sanity check
        if: matrix.platform != 'wasm'
        working-directory: build
        shell: bash
        run: |
          if [ -f sanity-check ]; then
            ./sanity-check
          elif [ -f sanity-check.exe ]; then
            ./sanity-check.exe
          fi

      # ---- Upload sanity-check for manual testing on other machines ----
      - name: Upload sanity-check (Unix)
        if: matrix.artifact != '' && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/sanity-check
          retention-days: 7

      - name: Upload sanity-check (Windows)
        if: matrix.artifact != '' && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/sanity-check.exe
          retention-days: 7

      # ---- Report ----
      - name: Report discovered backends
        if: always()
        shell: bash
        run: |
          echo "### Backend Discovery" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "MENTAL_HAS_" build/CMakeCache.txt >> $GITHUB_STEP_SUMMARY || echo "No backends discovered" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
